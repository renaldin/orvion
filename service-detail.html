<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Detail - Orvion Creative</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="css/hype.css?v=1.1">
    <style>
        body {
            background: radial-gradient(circle at 50% -20%, #3c404a 0%, #1e1f24 100%) !important;
            background-attachment: fixed !important;
            color: #fff;
        }

        .service-detail-hero {
            padding: 150px 20px 80px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero-glow-detail {
            position: absolute;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(242,92,39,0.15) 0%, rgba(0,0,0,0) 70%);
            z-index: 0;
            pointer-events: none;
        }

        .service-title {
            font-family: 'Syne', sans-serif;
            font-size: 42px;
            line-height: 1.1;
            margin-bottom: 25px;
            position: relative;
            z-index: 1;
            background: linear-gradient(180deg, #FFFFFF 0%, #A0A0A0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @media (max-width: 768px) {
            .service-title {
                font-size: 34px;
            }
        }

        .service-tag {
            display: inline-block;
            background: rgba(242, 92, 39, 0.1);
            color: var(--orange, #f25c27);
            border: 1px solid rgba(242, 92, 39, 0.3);
            padding: 8px 20px;
            border-radius: 30px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
        }

        .service-content-wrapper {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px 100px;
            position: relative;
            z-index: 1;
        }

        .glass-detail-panel {
            background: rgba(28, 28, 28, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 32px;
            padding: 50px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            margin-bottom: 40px;
            position: relative;
            z-index: 2;
        }

        @media (max-width: 768px) {
            .glass-detail-panel {
                padding: 30px 20px;
                border-radius: 24px;
            }
        }

        .service-desc {
            font-family: 'Inter', sans-serif;
            font-size: 18px;
            color: var(--text-muted, #a0a0a0);
            line-height: 1.8;
            margin-bottom: 50px;
            text-align: center;
            max-width: 750px;
            margin-inline: auto;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .feature-card {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 25px 30px;
            transition: all 0.3s ease;
            display: flex;
            align-items: flex-start;
            gap: 20px;
        }

        .feature-card:hover {
            transform: translateY(-5px);
            border-color: rgba(242, 92, 39, 0.3);
            background: rgba(242, 92, 39, 0.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .feature-icon {
            width: 44px;
            height: 44px;
            background: rgba(242, 92, 39, 0.1);
            border: 1px solid rgba(242, 92, 39, 0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--orange, #f25c27);
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .feature-card:hover .feature-icon {
            background: var(--orange, #f25c27);
            color: #fff;
        }

        .feature-text {
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            line-height: 1.5;
            font-weight: 500;
            padding-top: 10px;
        }

        .cta-action {
            text-align: center;
            margin-top: 50px;
            padding-top: 40px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--orange, #f25c27);
            color: #fff;
            padding: 18px 45px;
            border-radius: 100px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 18px;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(242, 92, 39, 0.3);
        }

        .btn-primary:hover {
            background: #d84b1b;
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 30px rgba(242, 92, 39, 0.4);
        }

        .btn-primary svg {
            margin-left: 10px;
        }

        .nav-back {
            display: inline-flex;
            align-items: center;
            color: var(--text-muted);
            text-decoration: none;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            margin-bottom: 25px;
            transition: color 0.3s;
            padding: 10px 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .nav-back:hover {
            color: #fff;
            background: rgba(255,255,255,0.1);
        }

        .nav-back svg {
            margin-right: 8px;
        }

        .loader {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 50vh;
            color: #fff;
            font-family: 'Syne', sans-serif;
            font-size: 24px;
            font-weight: 700;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .not-found {
            text-align: center;
            padding: 150px 20px;
        }

        .not-found h2 {
            font-family: 'Syne', sans-serif;
            font-size: 48px;
            margin-bottom: 20px;
        }

        .not-found p {
            color: var(--text-muted);
            margin-bottom: 40px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <nav class="navbar" data-aos="fade-down">
        <a href="index.html" class="logo" style="text-decoration: none;">
            <span class="logo-icon">o</span>
            <span class="logo-text">Orvion<br>Creative</span>
        </a>
        <a href="index.html#contact" class="btn-start">LET'S TALK <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></a>
    </nav>

    <div id="serviceDetailContainer">
        <div class="loader">Memuat Detail Layanan...</div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

                features: [

            "ugc-viral-campaign": {

            "website-design-development": {

                    "Sistem Keamanan & Maintenance"
                ]

            "commercial-video-production": {

            "ads": {

                desc: "Optimasi budget iklan Anda di berbagai platform digital untuk hasil yang terukur. Kami tidak hanya mengincar klik atau impresi, tapi juga Return on Ad Spend (ROAS) yang positif dan menguntungkan.",

            "tiktok-live-shopping": {

                desc: "Fasilitasi tren belanja masa kini lewat Live Streaming TikTok. Kami meyediakan tim lengkap, peralatan, strategi promosi, hingga host berpengalaman untuk memaksimalkan penjualan (checkout) saat sesi live.",
                features: [
                    "Setup Studio & Peralatan Live",
                    "Penyediaan Host/Streamer Komunikatif",
                    "Strategi Flash Sale & Gimmick",
                    "Manajemen Produk & Moderator Live"
                ]
            },
            "ads-management-digital-advertising": {
                title: "Ads Management & Digital Advertising",
                tag: "Creative Service",
                desc: "Penanganan iklan yang lebih komprehensif (Meta Ads, Google Ads, TikTok Ads) untuk me-scale up bisnis yang sudah berjalan. Terstruktur mulai dari funneling, retargeting, hingga scaling budget secara stabil.",

                    "Full-Funnel Advertising Strategy",
                    "Pixel Installation & Tracking Setup",
                    "Advanced Retargeting Engine",
                    "Optimization & Scaling Iklan"

            "design-graphic-maker": {
                title: "Design & Graphic Maker",
                tag: "Creative Service",
                desc: "Kebutuhan desain harian Anda, diselesaikan dengan standar premium agensi. Pembuatan berbagai macam aset visual mulai dari logo, banner promosi, kemasan, hingga deck presentasi yang stand out.",

                    "Brand Identity (Logo, Warna, Tipografi)",

                    "Penyampaian Brief Visual yang Tepat"
                ]
            },
            "website-landing-page": {
                title: "Website Landing Page",
                tag: "Orvion Network",
                desc: "Dapatkan halaman web mandiri (single-page) yang dirancang secara khusus untuk campaign marketing atau periklanan Anda. Halaman ini difokuskan pada satu tujuan: konversi. Desain menarik dengan copywriting memikat yang membuat pengunjung mengambil tindakan.",

            "webapp": {
                title: "WebApp",
                tag: "Orvion Network",
                desc: "Kami mendevelop aplikasi berbasis web custom yang dirancang spesifik untuk memecahkan proses operasional internal bisnis Anda. Dari portal tim, sistem rekrutmen, portal klien, manajemen dokumen, atau sistem informasi yang kompleks.",
                features: [
                    "Sistem Otentikasi & Keamanan",
                    "Database Dinamis (SQL/NoSQL)",
                    "Desain Dashboard Administratif",
                    "Fitur Custom Sesuai Flow Kerja Bisnis"
                ]
            },
            "pos": {
                title: "POS",
                tag: "Orvion Network",
                desc: "Sistem kasir cerdas (Point of Sale) untuk ritel atau F&B. Mencatat penjualan secara real-time, mengelola struk, menghubungkan transaksi dengan pergerakan stok, dan menghasilkan laporan keuangan otomatis untuk cabang bisnis Anda.",

                    "Dukungan Barcode Scanner & Struk",
                    "Manajemen Inventaris Real-Time",
                    "Laporan Harian Kas Keuangan"
                ]
            },
            "erp-basic": {
                title: "ERP Basic",
                tag: "Orvion Network",
                desc: "Langkah awal mengotomasi bisnis Anda dengan sistem Enterprise Resource Planning versi esensial. Menyederhanakan alur kerja utama seperti pencatatan inventaris dasar, penjualan, dan invoice dari satu layar pintar terintegrasi.",

        const renderFeatureIcon = () => `
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        `;

        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const serviceId = params.get('id');
            const container = document.getElementById('serviceDetailContainer');

            if (serviceId && allServices[serviceId]) {
                const service = allServices[serviceId];
                document.title = `${service.title} - Layanan Orvion Creative`;

                const whatsappText = encodeURIComponent(`Halo Orvion Creative, saya tertarik dengan layanan ${service.title} yang ada di website Anda. Bisa berdiskusi lebih lanjut?`);

                let featuresHTML = '';
                service.features.forEach((feat, index) => {
                    featuresHTML += `
                        <div class="feature-card" data-aos="fade-up" data-aos-delay="${150 + (index * 50)}">
                            <div class="feature-icon">
                                ${renderFeatureIcon()}
                            </div>
                            <div class="feature-text">${feat}</div>
                        </div>
                    `;
                });

                container.innerHTML = `
                    <div class="service-detail-hero">
                        <div class="hero-glow-detail"></div>
                        <a href="index.html" class="nav-back" data-aos="fade-down">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
                            Kembali ke Beranda
                        </a>
                        <div data-aos="zoom-in" data-aos-delay="100">
                            <span class="service-tag">${service.tag}</span>
                            <h2 class="service-title">${service.title}</h2>
                        </div>
                    </div>

                    <div class="service-content-wrapper">
                        <div class="glass-detail-panel" data-aos="fade-up" data-aos-delay="200">
                            <p class="service-desc">${service.desc}</p>
                            
                            <h3 style="font-family:'Syne', sans-serif; font-size: 22px; margin-bottom: 30px; text-align: center; color: #fff;" data-aos="fade-up" data-aos-delay="300">Yang Akan Anda Dapatkan</h3>
                            
                            <div class="features-grid">
                                ${featuresHTML}
                            </div>
                            
                            <div class="cta-action" data-aos="fade-up" data-aos-delay="400">
                                <a href="https://wa.me/62895336928026?text=${whatsappText}" target="_blank" class="btn-primary">
                                    Konsultasikan Kebutuhan Anda
                                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                                </a>
                            </div>
                        </div>
                    </div>
                `;
            } else {
                container.innerHTML = `
                    <div class="not-found">
                        <h2>Layanan Tidak Ditemukan</h2>
                        <p>Maaf, layanan yang Anda maksud tidak tersedia atau alamat URL salah.</p>
                        <a href="index.html" class="btn-primary">
                            Kembali ke Beranda
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                        </a>
                    </div>
                `;
            }

            // Initialize animations AFTER content is injected
            AOS.init({ duration: 800, once: true });
        });
    </script>
</body>
</html>
